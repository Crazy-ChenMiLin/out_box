spring.application.name=demo1
spring.main.banner-mode=off

# === Logs ===
# Keep the console focused on the learning flow:
# HTTP -> Service -> Outbox -> Canal -> Kafka.
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.charset.console=UTF-8
logging.level.root=WARN
logging.level.org.example.demo1=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.com.alibaba.otter.canal=WARN

# === Local Datasource ===
spring.datasource.url=jdbc:mysql://localhost:3306/demo1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:czqCZQ197623@}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# === Canal TCP client ===
# The local canal-server container exposes 11111:11111 and keeps serverMode=tcp.
canal.client.enabled=true
canal.client.host=localhost
canal.client.port=11111
canal.client.destination=example
canal.client.username=
canal.client.password=
canal.client.subscribe-filter=demo1\\.outbox
canal.client.batch-size=100
canal.client.empty-sleep-ms=1000
canal.client.topic=inventory-events

# === Kafka ===
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# === Optional fallback poller ===
# Keep disabled when Canal is enabled, otherwise one outbox row can be published twice.
outbox.publisher.enabled=false
outbox.publisher.topic=inventory-events
outbox.poller.fixed-delay-ms=5000
